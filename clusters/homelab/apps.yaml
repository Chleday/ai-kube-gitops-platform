---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 75.15.1
    helm:
      values: |
        grafana:
          enabled: true
          adminPassword: prom-operator
          service:
            type: ClusterIP
        prometheus:
          prometheusSpec:
            retention: 7d
            storageSpec: {}
  destination: { server: https://kubernetes.default.svc, namespace: monitoring }
  syncPolicy: { automated: { prune: true, selfHeal: true }, syncOptions: [CreateNamespace=true, ServerSideApply=true] }
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.31.0
    helm:
      values: |
        deploymentMode: SingleBinary
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
        singleBinary:
          replicas: 1
        minio:
          enabled: false
  destination: { server: https://kubernetes.default.svc, namespace: logging }
  syncPolicy: { automated: { prune: true, selfHeal: true }, syncOptions: [CreateNamespace=true] }
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: alloy
    targetRevision: 1.2.1
    helm:
      values: |
        alloy:
          configMap:
            content: |
              discovery.kubernetes "pods" { role = "pod" }
              discovery.relabel "pod_logs" {
                targets = discovery.kubernetes.pods.targets
                rule { source_labels = ["__meta_kubernetes_namespace"]; target_label = "namespace" }
                rule { source_labels = ["__meta_kubernetes_pod_name"]; target_label = "pod" }
                rule { source_labels = ["__meta_kubernetes_pod_container_name"]; target_label = "container" }
              }
              loki.source.kubernetes "pod_logs" {
                targets    = discovery.relabel.pod_logs.output
                forward_to = [loki.write.default.receiver]
              }
              loki.write "default" {
                endpoint { url = "http://loki-gateway.logging.svc.cluster.local/loki/api/v1/push" }
              }
  destination: { server: https://kubernetes.default.svc, namespace: logging }
  syncPolicy: { automated: { prune: true, selfHeal: true }, syncOptions: [CreateNamespace=true] }
---
apiVersion: argoproj.io/v1alpha1
