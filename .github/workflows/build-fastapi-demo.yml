name: build-fastapi-demo
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - services/fastapi-demo/**
      - .github/workflows/build-fastapi-demo.yml
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: services/fastapi-demo
          push: true
          tags: ghcr.io/chleday/kube-gitops-fastapi-demo:0.1.0
