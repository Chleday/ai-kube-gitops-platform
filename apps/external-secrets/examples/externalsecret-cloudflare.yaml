# Example only. This manifest contains no real secret value.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: example-secret-store
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token
  data:
    - secretKey: token
      remoteRef:
        key: cloudflare-api-token
        property: token
